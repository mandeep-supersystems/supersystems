<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow & Costing - SUPERSYSTEMS</title>
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/workflow/workflow.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
<header class="header">
    <div class="header-left">
        <div class="logo">
            <img class="logo-light" src="/static/img/light_mode_logo.png" alt="SUPERSYSTEMS" height="36">
            <img class="logo-dark" src="/static/img/Dark_mode_logo.png" alt="SUPERSYSTEMS" height="36">
            <span class="logo-text">SUPERSYSTEMS</span>
        </div>
        <div class="nav-item services-trigger" onclick="toggleServices()">
            <span class="material-icons-outlined">apps</span><span>Services</span>
            <span class="material-icons-outlined arrow">expand_more</span>
        </div>
    </div>
    <div class="header-center">
        <div class="search-box">
            <span class="material-icons-outlined">search</span>
            <input type="text" placeholder="Search services..." id="globalSearch" oninput="handleSearch(this.value)">
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
    <div class="header-right">
        <button class="header-icon-btn theme-toggle" onclick="toggleTheme()">
            <span class="material-icons-outlined icon-light">dark_mode</span>
            <span class="material-icons-outlined icon-dark">light_mode</span>
        </button>
        <div class="user-menu" id="userMenu">
            <div class="user-avatar" onclick="toggleUserMenu()"><span class="material-icons-outlined">person</span></div>
            <div class="user-dropdown" id="userDropdown">
                <a href="#" onclick="logout()"><span class="material-icons-outlined">logout</span>Logout</a>
            </div>
        </div>
    </div>
</header>
<div class="services-panel" id="servicesPanel">
    <div class="services-panel-header">
        <h3>All Services</h3>
        <div style="display:flex;align-items:center;gap:10px">
            <button class="btn-outline" id="toggleAllServicesBtn" onclick="toggleAllServices()"><span class="material-icons-outlined">unfold_less</span> Collapse All</button>
            <button class="close-btn" onclick="toggleServices()"><span class="material-icons-outlined">close</span></button>
        </div>
    </div>
    <div class="services-grid" id="servicesGrid"></div>
</div>
<div class="overlay" id="overlay" onclick="toggleServices()"></div>

<div class="wf-layout">
    <aside class="wf-sidebar">
        <div class="sidebar-header">
            <span class="material-icons-outlined">account_tree</span>
            <h3>Workflow & Costing</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link"><span class="material-icons-outlined">arrow_back</span>Home</a>
            <div class="sidebar-divider"></div>
            <button class="sidebar-link active" data-sec="routings" onclick="showSec('routings')"><span class="material-icons-outlined">route</span>Process Routings</button>
            <a href="/machine" class="sidebar-link"><span class="material-icons-outlined">memory</span>Machines ↗</a>
        </nav>
    </aside>
    <main class="wf-content">

        <!-- ROUTINGS LIST -->
        <section class="content-section active" id="sec-routings">
            <div class="section-header">
                <h2>Process Routings</h2>
                <button class="btn-primary" onclick="openNewRoutingModal()"><span class="material-icons-outlined">add</span> New Routing</button>
            </div>
            <div style="display:flex;gap:10px;margin-bottom:16px">
                <div style="flex:1;display:flex;align-items:center;gap:8px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:9px;padding:8px 14px">
                    <span class="material-icons-outlined" style="font-size:18px;color:var(--text-muted)">search</span>
                    <input type="text" id="routingSearch" placeholder="Search by part number or description..." oninput="filterRoutings(this.value)" style="border:none;outline:none;background:none;font-size:13px;color:var(--text-primary);flex:1">
                </div>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>Part Number</th><th>Description</th><th>Revision</th><th>Status</th><th>Created By</th><th>Updated</th><th>Actions</th></tr></thead>
                    <tbody id="routingsBody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<!-- NEW ROUTING MODAL -->
<div class="modal-overlay" id="newRoutingModal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3>New Process Routing</h3>
            <button class="close-btn" onclick="closeM('newRoutingModal')"><span class="material-icons-outlined">close</span></button>
        </div>
        <div class="modal-body">
            <form onsubmit="createRouting(event)">
                <div class="form-group" style="position:relative">
                    <label>Part Number * <span style="color:var(--text-muted);font-weight:400">(Manufactured parts only)</span></label>
                    <input type="text" id="newRoutingPartSearch" placeholder="Type to search manufactured parts..." autocomplete="off" oninput="searchParts(this.value)" required>
                    <div id="partSearchDropdown" class="part-search-dropdown" style="display:none"></div>
                    <input type="hidden" id="newRoutingPartNumber">
                    <div id="newRoutingPartSelected" style="font-size:12px;color:var(--accent);margin-top:4px"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Revision</label><input type="text" id="newRoutingRev" value="1" placeholder="1"></div>
                    <div class="form-group"><label>Status</label>
                        <select id="newRoutingStatus">
                            <option value="draft">Draft</option>
                            <option value="active">Active</option>
                            <option value="obsolete">Obsolete</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Notes</label><textarea id="newRoutingNotes" rows="2"></textarea></div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeM('newRoutingModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create Routing</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <div class="modal-header"><h3>Confirm Delete</h3><button class="close-btn" onclick="closeM('deleteModal')"><span class="material-icons-outlined">close</span></button></div>
        <div class="modal-body">
            <p id="deleteMsg" style="font-size:13px;color:var(--text-secondary);margin-bottom:16px"></p>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeM('deleteModal')">Cancel</button>
                <button class="btn-primary" style="background:#e53935" id="deleteConfirmBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<div class="wf-toast" id="wfToast"></div>
<script src="/static/js/header.js"></script>
<script>requireAuth();</script>
<script src="/static/js/workflow/workflow.js"></script>
</body>
</html>
